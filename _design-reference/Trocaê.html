<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Trocaê — Trocas do Álbum da Copa</title>
<link rel="stylesheet" href="styles.css">
<style>
  html,body{height:100%;background:#0a3d30;}
  body{display:flex;align-items:center;justify-content:center;}
  /* palco que escala o frame pra caber em qualquer viewport */
  #stage{display:flex;align-items:center;justify-content:center;width:100vw;height:100vh;overflow:hidden;}
  #root{transform-origin:center center;}
</style>
</head>
<body>
  <div id="stage"><div id="root"></div></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="frames/ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="auth.jsx"></script>
  <script type="text/babel" src="onboarding.jsx"></script>
  <script type="text/babel" src="album.jsx"></script>
  <script type="text/babel" src="group.jsx"></script>
  <script type="text/babel" src="profile.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script>
    // escala o frame iOS (402×874) para caber na viewport, mantendo proporção
    function fitStage(){
      const root = document.getElementById('root');
      const W = 402, H = 874;
      const s = Math.min(window.innerWidth/W, window.innerHeight/H, 1);
      root.style.transform = 'scale('+s+')';
      root.style.width = W+'px';
      root.style.height = H+'px';
    }
    window.addEventListener('resize', fitStage);
    // re-fit depois que o React montar o frame
    const obs = new MutationObserver(fitStage);
    obs.observe(document.getElementById('root'), {childList:true, subtree:true});
    setTimeout(fitStage, 300);
  </script>
</body>
</html>
